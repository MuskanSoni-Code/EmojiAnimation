<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      margin: 0%;
      padding: 0%;
      box-sizing: border-box;
    }

    img {
      height: 20%;
      width: 10%;
      animation-name: emoji;
      animation-duration: 3s;
      animation-iteration-count: infinite;
      position: relative;
      transition-duration: 5s;
    }

    .img1 {
      height: 20%;
      width: 10%;
      animation-name: emoji1;
      animation-duration: 3s;
      animation-iteration-count: infinite;
      position: relative;
      transition-duration: 5s;
    }

    @keyframes emoji {
      from {
        left: 0;
        top: 0;
        scale: 0.1;
      }

      to {
        top: 500;
        left: calc(100% - 10%);
        scale: 1;
      }
    }

    @keyframes emoji1 {
      from {
        left: 0;
        scale: 0.1;
      }

      to {
        left: calc(100% - 20%);
        scale: 1;
      }
    }
  </style>

  <body>
    <img
      src="https://cdn.pixabay.com/photo/2017/03/05/21/55/emoticon-2120024_1280.png"
    />
    <img
      class="img1"
      src="https://cdn.pixabay.com/photo/2017/03/05/21/55/emoticon-2120024_1280.png"
    />
  </body>
</html>
